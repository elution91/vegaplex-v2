# Render Blueprint — deploys the FastAPI backend.
# https://render.com/docs/blueprint-spec
#
# Required dashboard secrets (do NOT commit):
#   VEGAPLEX_AUTH_PASSWORD   — shared password for beta access
#   VEGAPLEX_CORS_ORIGINS    — comma-separated, e.g. "https://vegaplex.vercel.app"
services:
  - type: web
    name: vegaplex-api
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    healthCheckPath: /api/auth/status
    disk:
      name: vegaplex-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: VEGAPLEX_DATA_DIR
        value: /app/data
      - key: VEGAPLEX_AUTH_PASSWORD
        sync: false
      - key: VEGAPLEX_CORS_ORIGINS
        sync: false
      # Massive S3 keys — used by the /api/admin/seed endpoint
      - key: MASSIVE_ACCESS_KEY
        sync: false
      - key: MASSIVE_SECRET_KEY
        sync: false
